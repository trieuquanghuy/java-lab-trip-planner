# Trip Planner — canonical docker-compose stack (D-18).
# 10 services: postgres, redis, mailhog, zipkin, eureka-server, api-gateway,
# auth-service, trip-service, destination-service, frontend.
#
# Conventions:
# - Compose v2 syntax — no top-level `version:` key (deprecated).
# - D-20 / Pitfall 10: every service has a healthcheck; every dependent uses
#   `depends_on: { <dep>: { condition: service_healthy } }`.
# - D-22: downstream services + postgres + redis + eureka dashboard bind to
#   127.0.0.1 ONLY. api-gateway / frontend / mailhog UI / zipkin UI bind 0.0.0.0.
# - D-24 / C14: all sensitive values come from `.env` via Compose substitution.
# - Multi-stage backend builds (BLOCKER 2 fix): build.context: .. (repo root,
#   the Gradle multi-module root) + build.dockerfile: services/<svc>/Dockerfile.
# - frontend Dockerfile is owned by Plan 09 (BLOCKER 3); this file only
#   references it via build.context: ../frontend.
#
# Phase 1 (01-06-PLAN.md): api-gateway.depends_on extended with redis +
# {auth,trip,destination}-service all gated on service_healthy. Closes
# Pitfall H (gateway booting before Redis → RedisConnectionFailureException
# on first request) and Pitfall J (gateway booting before downstream
# services → 502 from NettyRoutingFilter). Source: .planning/phases/01-api-
# gateway/01-RESEARCH.md Pitfall H (lines 960-965) + Pitfall J (lines 974-
# 977); 01-CONTEXT.md D-05/D-06 (RedisRateLimiter on 5 routes) + D-08
# (static-URI routing has no Eureka fallback). Convention C11-P1.

name: tripplanner

services:

  # -- Infrastructure -----------------------------------------------------------

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "127.0.0.1:1025:1025"   # SMTP listener — loopback only (D-22)
      - "0.0.0.0:8025:8025"     # web UI — public for dev convenience

  zipkin:
    image: openzipkin/zipkin:3
    ports:
      - "0.0.0.0:9411:9411"

  # -- Service registry ---------------------------------------------------------

  eureka-server:
    build:
      context: ..                              # repo root (Gradle multi-module root)
      dockerfile: services/eureka-server/Dockerfile
    ports:
      - "127.0.0.1:8761:8761"                  # dashboard loopback only (D-22)
    environment:
      SPRING_PROFILES_ACTIVE: docker
    # healthcheck inherits from Dockerfile

  # -- Backend services ---------------------------------------------------------

  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "0.0.0.0:8080:8080"                    # public surface
    depends_on:
      eureka-server:
        condition: service_healthy
      redis:                            # NEW Phase 1 — Pitfall H: gateway needs Redis healthy before boot
        condition: service_healthy
      auth-service:                     # NEW Phase 1 — Pitfall J: avoid first-request 502 on /api/auth/**
        condition: service_healthy
      trip-service:                     # NEW Phase 1 — Pitfall J: avoid first-request 502 on /api/trips/**
        condition: service_healthy
      destination-service:              # NEW Phase 1 — Pitfall J: avoid first-request 502 on /api/{search,destinations}/**
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_URL: http://eureka-server:8761/eureka
      ZIPKIN_BASE_URL: http://zipkin:9411
    # healthcheck inherits from Dockerfile

  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "127.0.0.1:8081:8081"                  # downstream — loopback only (D-22)
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      mailhog:                                 # Phase 2 D-03 — JavaMailSender targets compose-network mailhog:1025
        condition: service_started
      redis:                                   # Phase 2 D-06 — LoginRateLimiter targets compose-network redis:6379
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      AUTH_DB_USER: ${AUTH_DB_USER}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      EUREKA_URL: http://eureka-server:8761/eureka
      ZIPKIN_BASE_URL: http://zipkin:9411
      MAIL_FROM: ${MAIL_FROM:-no-reply@tripplanner.local}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
    # healthcheck inherits from Dockerfile

  trip-service:
    build:
      context: ..
      dockerfile: services/trip-service/Dockerfile
    ports:
      - "127.0.0.1:8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      TRIP_DB_USER: ${TRIP_DB_USER}
      TRIP_DB_PASSWORD: ${TRIP_DB_PASSWORD}
      EUREKA_URL: http://eureka-server:8761/eureka
      ZIPKIN_BASE_URL: http://zipkin:9411
    # healthcheck inherits from Dockerfile

  destination-service:
    build:
      context: ..
      dockerfile: services/destination-service/Dockerfile
    ports:
      - "127.0.0.1:8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      DESTINATION_DB_USER: ${DESTINATION_DB_USER}
      DESTINATION_DB_PASSWORD: ${DESTINATION_DB_PASSWORD}
      EUREKA_URL: http://eureka-server:8761/eureka
      ZIPKIN_BASE_URL: http://zipkin:9411
    # healthcheck inherits from Dockerfile

  # -- Frontend (Plan 09 owns the Dockerfile) -----------------------------------

  frontend:
    build:
      context: ../frontend                     # frontend dir; compose file lives in infra/
      dockerfile: Dockerfile                   # relative to context = frontend/Dockerfile (Plan 09)
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    ports:
      - "0.0.0.0:5173:5173"
    # No depends_on — frontend is a static bundle and can render before backends are up.
    # healthcheck inherits from Plan 09's Dockerfile.

volumes:
  pgdata:
