# PHASE 0 ROUTE TABLE: /__health/<svc> entries sit at the TOP. Phase 1 will append /api/<svc>/** entries below.
# Convention (00-CONTEXT.md "Cross-phase handoff" line 274): do NOT remove the /__health/<svc> entries when
# Phase 1 lands — they stay as ops debug endpoints forever.
#
# D-02 / Convention C9 hard rule: every downstream URI is STATIC (http://service-name:port). NEVER use the
# Eureka-routed scheme. Rationale:
#   - Phase 0 cold-start: a load-balanced scheme would 503 until the Eureka registry warms (Pitfall 10).
#   - Phase 0 routing path is intentionally NOT through Eureka — Eureka is in the observability path
#     (dashboard) only (D-03).
#
# D-25 / Pitfall 7: spring.application.name=api-gateway is set so Zipkin / log JSON attribute spans
# correctly. Missing this would group all gateway spans under the default "application" name.
#
# D-04: management.tracing.sampling.probability=1.0 in dev so every request produces a trace
# (Pitfall 7 step 4 verification in Phase 1).
spring:
  application:
    name: api-gateway          # D-25 (Pitfall 7) — Zipkin service name
  profiles:
    default: dev
  data:                        # Phase 1 (01-03-PLAN.md) — RedisRateLimiter backing store (D-05/D-06)
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      httpclient:               # Phase 1 (D-10) — fail-fast timeouts
        connect-timeout: 1000   # 1s — fail-fast on stuck downstream
        response-timeout: 10s   # 10s — generous window for cold-cache search and bcrypt-12 login
      routes:
        # P0 health-routing convention — STATIC URIs per D-02 (no Eureka load-balanced scheme).
        # /__health/gateway routes back to this gateway's own GatewayHealthController for naming
        # consistency with the /__health/<svc> family. The smoke script can iterate over a uniform
        # set including "gateway" if SC#3-route ever needs to verify the gateway placeholder
        # through the route table.
        - id: health-gateway
          uri: http://localhost:8080
          predicates:
            - Path=/__health/gateway
          filters:
            - SetPath=/__health
        - id: health-auth
          uri: http://auth-service:8081
          predicates:
            - Path=/__health/auth
          filters:
            - SetPath=/__health
        - id: health-trip
          uri: http://trip-service:8082
          predicates:
            - Path=/__health/trip
          filters:
            - SetPath=/__health
        - id: health-destination
          uri: http://destination-service:8083
          predicates:
            - Path=/__health/destination
          filters:
            - SetPath=/__health
        # Phase 1 will append /api/auth/**, /api/search/**, /api/destinations*/**, /api/trips/** below this comment.
        # --- Phase 1 routes (Source: 01-RESEARCH.md Pattern 5 lines 670-763; 01-CONTEXT.md
        #     D-05/D-06/D-08/D-10; this PLAN: 01-03-PLAN.md). Static URIs only (C9-P1).
        #     KeyResolver bean refs ipKeyResolver / userIdKeyResolver are defined in
        #     services/api-gateway/.../routing/KeyResolverConfig.java. ---
        # --- AUTH (D-03 public allowlist; D-05 IP-only rate limit on /login) ---
        - id: auth-login
          uri: http://auth-service:8081           # C9-P1 static URI; D-08
          predicates:
            - Path=/api/auth/login
            - Method=POST
          filters:
            # D-05 IP-only 30 req / 900 s (Phase 1 leg of the split; Phase 2 adds IP+email in auth-service).
            # Sub-1-rps formula: replenishRate=30, requestedTokens=900, burstCapacity=30
            # → 30-token bucket refilling at 30 tokens/sec but each request costs 900 tokens
            # → steady-state allowed rate = 30 tokens / 900 token-cost = 1 req per 30 s = 30 req/15 min.
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 30
                redis-rate-limiter.requestedTokens: 900
                key-resolver: "#{@ipKeyResolver}"
        - id: auth-signup
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/signup
            - Method=POST
          filters:
            # D-06: 3 / hour by IP — replenishRate=3, requestedTokens=3600, burst=3.
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 3
                redis-rate-limiter.burstCapacity: 3
                redis-rate-limiter.requestedTokens: 3600
                key-resolver: "#{@ipKeyResolver}"
        - id: auth-verify
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/verify
        - id: auth-refresh
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/refresh
        - id: auth-other
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**
        # --- SEARCH (D-03 public; D-06 IP-rate-limited 60/min) ---
        - id: search
          uri: http://destination-service:8083
          predicates:
            - Path=/api/search/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 60
                key-resolver: "#{@ipKeyResolver}"
        # --- DESTINATIONS (D-03 public; D-06 IP-rate-limited 60/min) ---
        - id: destinations
          uri: http://destination-service:8083
          predicates:
            - Path=/api/destinations/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 60
                key-resolver: "#{@ipKeyResolver}"
        # --- TRIPS (authenticated; D-06 userId-rate-limited 120/min — RequestRateLimiter
        #     runs AFTER AuthenticationWebFilter, so SecurityContext.principal is populated
        #     when userIdKeyResolver reads it.) ---
        - id: trips
          uri: http://trip-service:8082
          predicates:
            - Path=/api/trips/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 120
                key-resolver: "#{@userIdKeyResolver}"
server:
  port: 8080
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus    # T-00-20: env/configprops/beans/mappings INTENTIONALLY NOT exposed
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  tracing:
    sampling:
      probability: 1.0   # D-04 — full sampling in dev
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    fetch-registry: true
    register-with-eureka: true
