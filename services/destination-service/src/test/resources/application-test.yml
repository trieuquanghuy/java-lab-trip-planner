    secret: phase-1-jwt-fixture-secret-32bytes!!

spring:
  flyway:
    enabled: true
    schemas: destination
    default-schema: destination
    table: destination_flyway_schema_history
    locations: classpath:db/migration,classpath:db/test-migration
